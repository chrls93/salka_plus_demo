<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$alka MVP</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">$alka</div>
    <div class="top-actions">
      <button id="prevRoom" class="icon-btn" title="Poprzednia sala">‹</button>
      <button id="nextRoom" class="icon-btn" title="Następna sala">›</button>
    </div>
  </header>

  <main class="page">
    <section class="card room-card">
      <div class="room-header">
        <div>
          <h1 id="roomName">Toruń</h1>
          <p id="roomMeta" class="muted">N15, P.3, Orbita</p>
        </div>
        <span id="statusChip" class="chip busy">ZAJĘTA</span>
      </div>

      <div class="grid">
        <div class="row">
          <span class="label">Rezerwacja</span>
          <strong id="bookingRange">09:00 - 18:30</strong>
        </div>
        <div class="row">
          <span class="label">Na kogo salka</span>
          <strong id="ownerName">Karol Kowalski</strong>
        </div>
        <div class="row">
          <span class="label">Kontakt</span>
          <a id="ownerEmail" href="#">karol.kowalski@orange.com</a>
        </div>
        <div class="row">
          <span class="label">Telefon</span>
          <a id="ownerPhone" href="#">+48 600 700 800</a>
        </div>
      </div>

      <div class="actions">
        <button id="confirmBtn" class="btn primary">Potwierdź obecność</button>
        <button id="releaseBtn" class="btn ghost">Zwolnij salę</button>
        <button id="calendarBtn" class="btn ghost">Kalendarz sali</button>
      </div>
    </section>

    <section class="card calendar-card" id="calendarCard">
      <div class="calendar-top">
        <h2>Kwiecień 2026</h2>
        <div class="time-control">
          <label for="timeSlider">Godzina</label>
          <input id="timeSlider" type="range" min="8" max="19" step="0.5" value="14.5" />
          <strong id="timeValue">14:30</strong>
        </div>
      </div>

      <div class="timeline-wrap">
        <div id="hoursCol" class="hours"></div>
        <div id="timeline" class="timeline">
          <div id="bookingBlock" class="booking-block">
            <span id="bookingText"></span>
          </div>
          <div id="nowLine" class="now-line"></div>
        </div>
      </div>
    </section>
  </main>

  <dialog id="modal">
    <p id="modalText"></p>
    <button id="closeModal" class="btn primary">OK</button>
  </dialog>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
